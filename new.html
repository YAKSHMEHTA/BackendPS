<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>H ZOOM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  body { background:#06060c; overflow-x:hidden; cursor:none; font-family:'Bebas Neue',sans-serif; }

  #cur { width:8px; height:8px; background:#c8952a; border-radius:50%; position:fixed; top:0;left:0; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); }

  /* ── S1 ── */
  #s1 {
    height:100vh;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:0;
  }

  .word { display:flex; align-items:center; justify-content:center; }

  .letter {
    font-size:clamp(80px,18vw,220px);
    line-height:1; color:#e0d8c8;
    display:inline-block;
  }

  #letter-h { color:#c8952a; }

  .hint {
    font-family:'DM Mono',monospace;
    font-size:10px; letter-spacing:0.3em;
    color:#333; text-transform:uppercase; margin-top:32px;
  }

  /* ── PORTAL ── */
  #portal { height:600vh; }

  .portal-sticky {
    position:sticky; top:0; height:100vh;
    overflow:hidden;
    display:flex; align-items:center; justify-content:center;
  }

  #yellow-bg {
    position:absolute; inset:0; z-index:1;
    background:#c8952a; opacity:0;
  }

  /* other letters */
  #floating-word {
    position:absolute; z-index:3;
    display:flex; align-items:center; justify-content:center;
    pointer-events:none;
  }

  .fl {
    font-size:clamp(80px,18vw,220px);
    line-height:1; display:inline-block; color:#e0d8c8;
  }

  /* SVG H — perfectly centered */
  #fh-svg {
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%, -50%);
    z-index:4;
    pointer-events:none;
    overflow:visible;
    /* size matches the other letters */
    width:clamp(55px,11vw,135px);
    height:clamp(80px,18vw,220px);
  }

  /* next content */
  #next {
    position:absolute; inset:0; z-index:5;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:#c8952a; opacity:0;
    pointer-events:none;
    text-align:center; gap:16px; padding:0 8vw;
  }

  #next h2 {
    font-size:clamp(56px,10vw,130px);
    color:#06060c; line-height:0.85; letter-spacing:2px;
  }

  #next p {
    font-family:'DM Mono',monospace;
    font-size:12px; color:#7a5a1a; line-height:2; letter-spacing:0.1em;
  }

  #next .btn {
    margin-top:16px; font-family:'Bebas Neue'; font-size:16px;
    letter-spacing:4px; color:#06060c; border:2px solid #06060c;
    padding:14px 40px; background:transparent; cursor:pointer;
  }

  #next .btn:hover { background:#06060c; color:#c8952a; }

  /* ── S3 ── */
  #s3 {
    height:100vh; background:#06060c;
    display:flex; align-items:center; justify-content:center;
    border-top:1px solid #111;
  }

  #s3 h2 { font-size:clamp(48px,8vw,100px); color:#e0d8c8; letter-spacing:2px; }
  #s3 h2 span { color:#c8952a; }
</style>
</head>
<body>

<div id="cur"></div>

<!-- S1 -->
<section id="s1">
  <div class="word">
    <span class="letter" id="lk">K</span>
    <span class="letter" id="lr">R</span>
    <span class="letter" id="li">I</span>
    <span class="letter" id="ls">S</span>
    <span class="letter" id="letter-h">H</span>
  </div>
  <div class="hint">scroll to enter</div>
</section>

<!-- PORTAL -->
<section id="portal">
  <div class="portal-sticky">

    <div id="yellow-bg"></div>

    <!-- K R I S as DOM spans -->
    <div id="floating-word">
      <span class="fl" id="fk">K</span>
      <span class="fl" id="fr">R</span>
      <span class="fl" id="fi">I</span>
      <span class="fl" id="fs">S</span>
      <!-- H is separate SVG below -->
    </div>

    <!-- SVG H — vector, crisp at any scale, centered via CSS -->
    <svg id="fh-svg" viewBox="0 0 100 120" preserveAspectRatio="xMidYMid meet">
      <text
        x="50" y="104"
        text-anchor="middle"
        font-family="Bebas Neue, sans-serif"
        font-size="120"
        fill="#c8952a"
      >H</text>
    </svg>

    <div id="next">
      <h2>FULL STACK<br/>BUILDER.</h2>
      <p>React · Node · MongoDB · GSAP<br/>252+ problems · 200 day streak</p>
      <button class="btn">VIEW WORK →</button>
    </div>

  </div>
</section>

<!-- S3 -->
<section id="s3">
  <h2>WHAT'S <span>NEXT</span></h2>
</section>

<script>
  gsap.registerPlugin(ScrollTrigger)

  window.addEventListener('mousemove', e => {
    gsap.to('#cur', { x: e.clientX, y: e.clientY, duration: 0.08 })
  })

  // hero enter
  gsap.from(['#lk','#lr','#li','#ls','#letter-h'], {
    y: '110%', duration: 0.7,
    stagger: { each: 0.08, from: 'center' },
    ease: 'power4.out', delay: 0.3,
  })

  // ── PORTAL TIMELINE ──
  const tl = gsap.timeline({
    scrollTrigger: {
      trigger: '#portal',
      start: 'top top',
      end: '+=500%',
      scrub: 1.5,
      pin: true,
    }
  })

  tl
    // K R I S fly off
    .to('#fk', { x:'-50vw', y:'-30vh', opacity:0, rotation:-20, duration:1, ease:'power2.in' }, 0)
    .to('#fr', { x:'-25vw', y: '40vh', opacity:0, rotation: 15, duration:1, ease:'power2.in' }, 0)
    .to('#fi', { x: '20vw', y:'-50vh', opacity:0, rotation:-10, duration:1, ease:'power2.in' }, 0)
    .to('#fs', { x: '50vw', y: '35vh', opacity:0, rotation: 25, duration:1, ease:'power2.in' }, 0)

    // SVG H scales up — crisp vector, no blur ever
        // SVG H scales up — crisp vector, no blur ever
    .to('#fh-svg', {
      scale: 200,
      duration: 2.5,
      ease: 'power3.in',
      y:"-1000",
      opacity: 0,
      transformOrigin: '50% 50%',
    }, 0.5)

    // yellow bg floods in
    .to('#yellow-bg', {
      opacity: 0,
      duration: 2,
      ease: 'power2.in',
    }, 0.5)

    // H fades once bg is fully yellow
    .to('#fh-svg', {
      opacity: 0,
      duration: 0.4,
    }, 3)

    // next content appears
    .to('#next', {
      opacity: 1,
      pointerEvents: 'auto',
      duration: 0.5,
      ease: 'power2.out',
    }, 3.2)

    .from('#next h2', {
      y: 40, duration: 0.6, ease: 'power3.out',
    }, 3.2)

    .from('#next p', {
      y: 20, opacity: 0, duration: 0.5, ease: 'power2.out',
    }, 3.5)

    .from('#next .btn', {
      y: 16, opacity: 0, duration: 0.5, ease: 'power2.out',
    }, 3.7)
</script>
</body>
</html>
